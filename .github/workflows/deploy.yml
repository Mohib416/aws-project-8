name: Deploy to ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build Docker image
        run: docker build -t project-8-app .

      - name: Tag Docker image
        run: docker tag project-8-app:latest 257289933091.dkr.ecr.eu-west-1.amazonaws.com/project-8-repo:latest

      - name: Push Docker image
        run: docker push 257289933091.dkr.ecr.eu-west-1.amazonaws.com/project-8-repo:latest

      - name: Force ECS deployment
        run: |
          aws ecs update-service \
            --cluster project-8-cluster \
            --service project-8-service \
            --force-new-deployment